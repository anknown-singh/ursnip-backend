<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your New Email Address</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background-color:#f4f4f7;color:#333333;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;padding:40px;">
          <tr>
            <td>
              <h1 style="margin:0 0 24px;font-size:24px;color:#1a1a2e;">Verify Your New Email Address</h1>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">Hi,</p>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">You requested to change your email address. Please verify this new address by clicking the button below:</p>
              <table cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                  <td align="center" style="background-color:#4f46e5;border-radius:6px;">
                    <a href="{{ verify_link }}" style="display:inline-block;padding:14px 32px;color:#ffffff;text-decoration:none;font-size:16px;font-weight:bold;">Verify Email</a>
                  </td>
                </tr>
              </table>
              <p style="margin:0 0 16px;font-size:14px;line-height:1.5;color:#666666;">This link expires in 24 hours.</p>
              <p style="margin:0 0 16px;font-size:14px;line-height:1.5;color:#666666;">If you didn't request this change, you can safely ignore this email.</p>
              <hr style="border:none;border-top:1px solid #e0e0e0;margin:32px 0;">
              <p style="margin:0;font-size:12px;color:#999999;">&copy; {{ app_name }}. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
