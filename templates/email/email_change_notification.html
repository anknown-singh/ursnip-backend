<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Email Address Was Changed</title>
</head>
<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;background-color:#f4f4f7;color:#333333;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f7;padding:40px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff;border-radius:8px;padding:40px;">
          <tr>
            <td>
              <h1 style="margin:0 0 24px;font-size:24px;color:#1a1a2e;">Email Address Changed</h1>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">Hi,</p>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;">The email address associated with your account has been changed to:</p>
              <p style="margin:0 0 16px;font-size:16px;line-height:1.5;font-weight:bold;">{{ new_email }}</p>
              <p style="margin:0 0 16px;font-size:14px;line-height:1.5;color:#666666;">If you did not make this change, please contact our support team immediately to secure your account.</p>
              <hr style="border:none;border-top:1px solid #e0e0e0;margin:32px 0;">
              <p style="margin:0;font-size:12px;color:#999999;">&copy; {{ app_name }}. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

</html>
