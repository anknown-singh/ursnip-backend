services:
  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ursnip_test
      POSTGRES_PASSWORD: ursnip_test
      POSTGRES_DB: ursnip_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ursnip_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
